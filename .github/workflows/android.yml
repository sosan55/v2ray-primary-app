name: Android Build & Test

on: [push, pull_request]

jobs:
  build:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Setup Xray Core
        run: |
          mkdir -p app/src/main/assets/
          # استفاده از لینک مستقیم نسخه پایدار و اضافه کردن -o برای نادیده گرفتن سوالات unzip
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-arm64-v8a.zip -O xray.zip
          unzip -o xray.zip xray -d app/src/main/assets/
          # حذف فایل زیپ برای تمیز ماندن پروژه
          rm xray.zip
          echo "Xray core successfully placed in assets."

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Copy Env Example for Build Resiliency
        run: cp .env.example .env

      - name: Decode or Generate Debug Keystore
        run: |
          decoded=false
          if [ -f "debug.keystore.base64" ]; then
            if tr -d '\r\n' < debug.keystore.base64 | base64 -d > debug.keystore 2>/dev/null; then
              [ -s "debug.keystore" ] && decoded=true
            fi
          fi
          if [ "$decoded" = "false" ]; then
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 7
