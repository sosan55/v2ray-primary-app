- name: Checkout Repository
      uses: actions/checkout@v4

    # مرحله جدید: دانلود و انتقال هسته به پوشه assets
    - name: Download and Setup Xray Core
      run: |
        mkdir -p app/src/main/assets/
        wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-arm64-v8a.zip
        unzip -j xray.zip xray -d app/src/main/assets/
        echo "Xray core downloaded and placed in assets."

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'
    
    # ... ادامه کدهای قبلی (از Copy Env Example تا آخر) ...
