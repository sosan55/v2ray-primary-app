name: Android Build & Test

on: [push, pull_request]

jobs:
  build:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Copy Env Example for Build Resiliency
        run: cp .env.example .env

      - name: Decode or Generate Debug Keystore
        run: |
          decoded=false
          if [ -f "debug.keystore.base64" ]; then
            echo "Attempting to decode debug.keystore.base64..."
            if tr -d '\r\n' < debug.keystore.base64 | base64 -d > debug.keystore 2>/dev/null; then
              if [ -s "debug.keystore" ]; then
                echo "Successfully decoded debug.keystore"
                decoded=true
              fi
            fi
          fi

          if [ "$decoded" = "false" ]; then
            echo "Generating a brand new debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android \
              -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Download Xray Core Binary
        run: |
          XRAY_VERSION="v1.8.24"
          XRAY_URL="https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-android-arm64-v8a.zip"
          OUTPUT_DIR="app/src/main/jniLibs/arm64-v8a"
          OUTPUT_FILE="${OUTPUT_DIR}/libxray.so"

          if [ -f "$OUTPUT_FILE" ] && [ $(stat -c%s "$OUTPUT_FILE") -gt 1000 ]; then
            echo "[Xray] Already exists. Skipping."
            exit 0
          fi

          mkdir -p "$OUTPUT_DIR"
          mkdir -p "/tmp/xray"

          echo "[Xray] Downloading from $XRAY_URL ..."
          curl -L -o /tmp/xray/xray.zip "$XRAY_URL"
          echo "[Xray] Downloaded. Extracting..."

          unzip -o /tmp/xray/xray.zip xray -d /tmp/xray/
          cp /tmp/xray/xray "$OUTPUT_FILE"

          echo "[Xray] ✓ Done: $OUTPUT_FILE ($(stat -c%s $OUTPUT_FILE) bytes)"
          rm -rf /tmp/xray

      - name: Download tun2socks Binary
        run: |
          TUN2SOCKS_VERSION="v2.5.2"
          TUN2SOCKS_URL="https://github.com/xjasonlyu/tun2socks/releases/download/${TUN2SOCKS_VERSION}/tun2socks-linux-android-arm64.zip"
          ASSETS_DIR="app/src/main/assets"
          OUTPUT_FILE="${ASSETS_DIR}/tun2socks"

          if [ -f "$OUTPUT_FILE" ] && [ $(stat -c%s "$OUTPUT_FILE") -gt 1000 ]; then
            echo "[tun2socks] Already exists. Skipping."
            exit 0
          fi

          mkdir -p "$ASSETS_DIR"
          mkdir -p "/tmp/tun2socks"

          echo "[tun2socks] Downloading from $TUN2SOCKS_URL ..."
          curl -L -o /tmp/tun2socks/tun2socks.zip "$TUN2SOCKS_URL"
          echo "[tun2socks] Downloaded. Extracting..."

          unzip -o /tmp/tun2socks/tun2socks.zip -d /tmp/tun2socks/

          BINARY=$(find /tmp/tun2socks -name "tun2socks" -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "[tun2socks] ERROR: Binary not found in ZIP!"
            ls -la /tmp/tun2socks/
            exit 1
          fi

          cp "$BINARY" "$OUTPUT_FILE"
          chmod +x "$OUTPUT_FILE"

          echo "[tun2socks] ✓ Done: $OUTPUT_FILE ($(stat -c%s $OUTPUT_FILE) bytes)"
          rm -rf /tmp/tun2socks

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Run Unit & Robolectric Tests
        run: gradle testDebugUnitTest --tests "*Example*"

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Build Artifacts (Debug APK)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Build Artifacts (Release APK)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
